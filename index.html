<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>~/labs</title>
<style>
  :root {
    --bg: #0b0f14;
    --fg: #c8c5b8;
    --dim: #4d5566;
    --accent: #95e6cb;
    --link: #59c2ff;
    --warn: #ffb454;
    --err: #f07178;
    --banner: #ffe9a8;
  }
  html, body { background: var(--bg); }
  body {
    color: var(--fg);
    font-family: ui-monospace, "SF Mono", Menlo, Monaco, "Cascadia Mono", "Courier New", monospace;
    font-size: 14px;
    line-height: 1.55;
    margin: 0;
    min-height: 100vh;
    box-sizing: border-box;
  }

  /* Terminal */
  #terminal {
    max-width: 820px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem 4rem;
  }
  #terminal[hidden] { display: none; }

  #output > div { white-space: pre-wrap; word-break: break-word; }
  #output .banner { color: var(--banner); white-space: pre; overflow-x: auto; }
  #output .echo   { color: var(--fg); }
  #output .ok     { color: var(--accent); }
  #output .err    { color: var(--err); }
  #output .info   { color: var(--fg); }
  #output .dim    { color: var(--dim); }
  #output .warn   { color: var(--warn); }
  #output a       { color: var(--link); text-decoration: none; font-weight: bold; }
  #output a:hover { text-decoration: underline; }

  .line {
    display: flex;
    align-items: baseline;
    gap: 0;
    margin-top: 0.25rem;
  }
  #prompt-text {
    white-space: pre;
    user-select: none;
  }
  .prefix { color: var(--accent); }
  .host   { color: var(--dim); }
  input {
    flex: 1;
    background: transparent;
    border: 0;
    outline: 0;
    color: var(--fg);
    font: inherit;
    padding: 0;
    caret-color: var(--warn);
  }

  /* Lobby */
  #lobby {
    display: none;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }
  #lobby.active { display: flex; }
  #game {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #2c5530;
    max-width: 100vw;
    max-height: 100vh;
    box-shadow: 0 0 40px #000;
    cursor: none;
    outline: none;
  }

  /* Score overlay */
  #score-overlay {
    position: absolute;
    left: 50%;
    top: 38%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.88);
    border: 1px solid #4a4a4a;
    padding: 14px 22px;
    text-align: center;
    color: #cfe7c8;
    z-index: 10;
    min-width: 280px;
  }
  #score-overlay[hidden] { display: none; }
  #score-overlay .title {
    font-size: 13px;
    font-weight: bold;
    color: #ffe9a8;
    margin-bottom: 10px;
    letter-spacing: 0.06em;
  }
  #score-form {
    display: flex;
    gap: 6px;
    justify-content: center;
    align-items: center;
  }
  #score-name {
    background: #111;
    color: #cfe7c8;
    border: 1px solid #4a4a4a;
    padding: 6px 8px;
    font: inherit;
    font-size: 13px;
    width: 130px;
    outline: none;
  }
  #score-name:focus { border-color: #95e6cb; }
  #score-form button, #score-skip {
    background: #2a4a2a;
    color: #cfe7c8;
    border: 1px solid #4a4a4a;
    padding: 6px 10px;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  #score-form button:hover, #score-skip:hover { background: #3a6a3a; }
  #score-status {
    margin-top: 8px;
    font-size: 11px;
    min-height: 14px;
    color: #ffe9a8;
  }
</style>
</head>
<body>

<div id="terminal">
  <div id="output"></div>
  <form class="line" id="form" autocomplete="off">
    <span id="prompt-text"></span>
    <input id="input" autofocus spellcheck="false" autocapitalize="none" aria-label="terminal input">
  </form>
</div>

<div id="lobby">
  <canvas id="game" width="960" height="600" tabindex="0"></canvas>
  <div id="score-overlay" hidden>
    <div class="title">SUBMIT SCORE</div>
    <form id="score-form" autocomplete="off">
      <input id="score-name" type="text" maxlength="10" placeholder="name" spellcheck="false" aria-label="name">
      <button type="submit">Submit</button>
      <button type="button" id="score-skip">Skip</button>
    </form>
    <div id="score-status"></div>
  </div>
</div>

<script>
"use strict";

// =========================================================================
// Terminal — fake connections.
// =========================================================================
const COMMANDS = {
  bank: {
    protocol: "ssh",
    user:    "admin",
    ip:      "10.42.0.7",
    port:    22,
    confirm: "Connect to bank?",
    url:     "bank/index.html",
  },
  forum: {
    protocol: "ftp",
    user:    "anonymous",
    ip:      "185.220.101.14",
    port:    21,
    banner:  "Public archive ready.",
    confirm: "Continue as anonymous?",
    url:     "forum/index.html",
  },
  final: {
    protocol: "telnet",
    ip:      "203.0.113.45",
    port:    80,
    confirm: "Continue?",
    url:     "final/index.html",
  },
};

const output     = document.getElementById("output");
const inputEl    = document.getElementById("input");
const form       = document.getElementById("form");
const promptEl   = document.getElementById("prompt-text");
const terminalEl = document.getElementById("terminal");
const lobbyEl    = document.getElementById("lobby");

const SHELL_PROMPT_HTML = '<span class="host">guest@labs:~</span><span class="prefix"> $ </span>';

let mode = "boot";          // "boot" | "shell" | "child"
let askResolver = null;
let pendingQuestion = "";

function el(cls, html) {
  const d = document.createElement("div");
  if (cls) d.className = cls;
  if (html != null) d.innerHTML = html;
  return d;
}
function escape(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}
function print(html, cls) {
  output.appendChild(el(cls, (html === "" || html == null) ? " " : html));
  window.scrollTo(0, document.body.scrollHeight);
}
function ok(msg) {
  print('<span class="ok">[ ok ]</span> ' + escape(msg));
}
function abort() {
  print("Connection cancelled.", "warn");
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function setPromptHTML(html) { promptEl.innerHTML = html; }
function setPromptText(text) { promptEl.textContent = text; }
function showShellPrompt()   { setPromptHTML(SHELL_PROMPT_HTML); }
function hidePrompt()        { setPromptHTML(""); }

function ask(question) {
  pendingQuestion = question;
  setPromptText(question);
  return new Promise(res => askResolver = res);
}

async function runChild(fn) {
  mode = "child";
  hidePrompt();
  try { await fn(); }
  catch (e) { print("[error] " + escape(e.message), "err"); }
  pendingQuestion = "";
  askResolver = null;
  mode = "shell";
  showShellPrompt();
  inputEl.focus();
}

function echoShell(raw) {
  print(SHELL_PROMPT_HTML + escape(raw), "echo");
}
function echoAnswer(question, raw) {
  print(escape(question) + escape(raw), "echo");
}

// ----- Connection handlers ------------------------------------------------
async function doSSH(c) {
  print(escape(`ssh ${c.user}@${c.ip}`));
  await sleep(220); ok(`connecting to ${c.ip}:${c.port}`);
  await sleep(280); ok(`connected to ${c.ip}:${c.port}`);
  await sleep(220); ok(`secure channel ready`);
  const ans = (await ask(`${c.confirm} (yes/no) `)).trim().toLowerCase();
  if (ans !== "yes" && ans !== "y") return abort();
  await sleep(260); ok(`authenticating ${c.user}`);
  await sleep(280); ok(`session opened`);
  print("");
  finishConnection(c);
}

async function doFTP(c) {
  print(escape(`ftp ${c.user}@${c.ip}`));
  await sleep(220); ok(`connecting to ${c.ip}:${c.port}`);
  await sleep(280); ok(`connected to ${c.ip}:${c.port}`);
  await sleep(180); ok(c.banner || "FTP ready");
  const ans = (await ask(`${c.confirm} (yes/no) `)).trim().toLowerCase();
  if (ans !== "yes" && ans !== "y") return abort();
  await sleep(260); ok(`anonymous access granted`);
  await sleep(220); ok(`directory listing ready`);
  print("");
  finishConnection(c);
}

async function doTelnet(c) {
  print(escape(`telnet ${c.ip} ${c.port}`));
  await sleep(220); ok(`connecting to ${c.ip}:${c.port}`);
  await sleep(280); ok(`connection opened (${c.ip}:${c.port})`);
  const ans = (await ask(`${c.confirm} (yes/no) `)).trim().toLowerCase();
  if (ans !== "yes" && ans !== "y") return abort();
  await sleep(240); ok(`request sent`);
  await sleep(220); ok(`HTTP/1.1 200 OK`);
  await sleep(180); ok(`stream ready`);
  print("");
  finishConnection(c);
}

function finishConnection(c) {
  print("connected successfully.", "ok");
  print(`<span class="dim">→</span> <a href="${c.url}" target="_blank" rel="noopener">[CLICK HERE]</a>`);
}

const HANDLERS = { ssh: doSSH, ftp: doFTP, telnet: doTelnet };

// ----- `wait` → enter lobby ----------------------------------------------
async function doWait() {
  await sleep(180); ok("entering waiting room");
  await sleep(220); ok("loading assets");
  await sleep(180);
  enterLobby();
}

function enterLobby() {
  terminalEl.hidden = true;
  lobbyEl.classList.add("active");
  startLobby();
}

function returnToTerminal() {
  hideScoreOverlay();
  lobbyEl.classList.remove("active");
  terminalEl.hidden = false;
  showShellPrompt();
  inputEl.focus();
  pauseLobby();
}

// ----- Input handling -----------------------------------------------------
function handleLine(raw) {
  if (mode === "boot") return;
  if (mode === "child") {
    if (askResolver) {
      echoAnswer(pendingQuestion, raw);
      const r = askResolver;
      askResolver = null;
      pendingQuestion = "";
      hidePrompt();
      r(raw);
    }
    return;
  }
  const cmd = raw.trim().toLowerCase();
  if (!cmd) { echoShell(raw); return; }
  output.innerHTML = "";
  if (cmd === "clear") return;
  echoShell(raw);
  if (cmd === "wait") { runChild(doWait); return; }
  const c = COMMANDS[cmd];
  if (!c) {
    print(escape(cmd) + ": command not found", "err");
    return;
  }
  const handler = HANDLERS[c.protocol];
  if (!handler) { print("[error] no handler for " + c.protocol, "err"); return; }
  runChild(() => handler(c));
}

form.addEventListener("submit", e => {
  e.preventDefault();
  const v = inputEl.value;
  inputEl.value = "";
  handleLine(v);
});
document.addEventListener("click", e => {
  if (lobbyEl.classList.contains("active")) return;
  if (window.getSelection().toString()) return;
  if (e.target.tagName !== "A") inputEl.focus();
});

// ----- Boot sequence ------------------------------------------------------
async function boot() {
  mode = "boot";
  hidePrompt();
  const banner = [
    "  _         _      ____    ____  ",
    " | |       / \\    | __ )  / ___| ",
    " | |      / _ \\   |  _ \\  \\___ \\ ",
    " | |___  / ___ \\  | |_) |  ___) |",
    " |_____|/_/   \\_\\ |____/  |____/ ",
  ];
  for (const ln of banner) print(escape(ln), "banner");
  print("           cybersecurity sandbox · v0.1", "dim");
  print("");
  await sleep(180);
  const lines = [
    "[    0.000123] Booting labs/6.6.0 (x86_64)",
    "[    0.014211] Mounting /dev /sys /proc",
    "[    0.052330] Loading crypto modules: aes, sha256, ed25519",
    "[    0.118504] Loading net stack: ssh, ftp, telnet",
    "[    0.241007] systemd: started multi-user.target",
    "[  ok  ] reached target ─ network online",
    "[  ok  ] reached target ─ shell ready",
  ];
  for (const ln of lines) {
    print(escape(ln), "dim");
    await sleep(55 + Math.random() * 55);
  }
  print("");
  print("labs ttyS0 — ready.", "info");
  mode = "shell";
  showShellPrompt();
  inputEl.focus();
}
boot();

// =========================================================================
// Lobby
// =========================================================================
const SCORE_API = "https://cs1005cs1005.pythonanywhere.com/score";
const SCORES_API = "https://cs1005cs1005.pythonanywhere.com/scores";
const INITIAL_ENEMIES = 4;
const MAX_ENEMIES = 160;
const SPAWN_DOUBLE_SEC = 10;
const WEAPON_TIER_2 = 5;       // 2-shot spread
const WEAPON_TIER_3 = 10;      // 3-shot spread
const WEAPON_TIER_RING = 20;   // adds the small ring
const WEAPON_TIER_4 = 30;      // 4-shot spread
const WEAPON_TIER_RING_BIG = 50; // bigger / faster ring
const WEAPON_TIER_PIERCE = 100;  // 5-shot spread + piercing + dense ring
const WEAPON_TIER_MEGA   = 500;  // 6-shot, 2x damage, triple counter-rotating ring
const BOSS_STEP = 100;         // every N kills, escalating boss wave
const BOOST_STEP = 100;        // every N kills, drop a random boost
const BOOST_LIFE_FRAMES = 25 * 60;
const BOOST_PICKUP_R = 24;
const BOOST_TYPES = ["heal", "shield", "nova", "invuln", "slow"];
const MEGA_RIGHT  = 1000;      // mega projectors from the right
const MEGA_LEFT   = 2000;      // + left
const MEGA_TOP    = 3000;      // + top
const MEGA_BOTTOM = 4000;      // + bottom
const MEGA_CENTER = 5000;      // + center circles, faster cadence

const DECOR = [
  { type: "tree", x:  90, y: 170 },
  { type: "tree", x: 220, y: 110 },
  { type: "tree", x: 410, y: 140 },
  { type: "tree", x: 600, y: 120 },
  { type: "tree", x: 780, y: 170 },
  { type: "tree", x: 880, y: 290 },
  { type: "tree", x: 130, y: 340 },
  { type: "tree", x: 720, y: 380 },
  { type: "tree", x: 540, y: 460 },
  { type: "rock", x: 290, y: 250 },
  { type: "rock", x: 470, y: 290 },
  { type: "rock", x: 660, y: 240 },
  { type: "rock", x: 840, y: 470 },
  { type: "rock", x: 200, y: 480 },
  { type: "rock", x: 380, y: 510 },
];

let lobbyStarted = false;
let lobbyRunning = false;
let canvas, ctx, W, H;

const scoreOverlay   = document.getElementById("score-overlay");
const scoreForm      = document.getElementById("score-form");
const scoreNameInput = document.getElementById("score-name");
const scoreSkipBtn   = document.getElementById("score-skip");
const scoreStatusEl  = document.getElementById("score-status");
let scoreSubmitting = false;

const pressed = new Set();
function down(...names) { for (const n of names) if (pressed.has(n)) return true; return false; }

const MOVEMENT_KEYS = new Set([
  "w","a","s","d",
  "arrowup","arrowdown","arrowleft","arrowright"," ",
]);

const mouse = { x: 0, y: 0, down: false };

const player = {
  x: 0, y: 0,
  speed: 3.0,
  cooldown: 0,
  facing: 1,
  hp: 20, maxHp: 20,
  invuln: 0,
  shotsFired: 0,
  shotsHit: 0,
};

const HEAL_INTERVAL_MS = 10000;
let lastHealTime = 0;

const enemyTypes = ["bug", "mask", "virus"];
const bugColors  = ["#7ad068", "#68a0d0", "#b878d0"];
const enemies = [];
const bullets = [];
const enemyBullets = [];
const trail = [];
let kills = 0;
let t = 0;
let gameOver = false;
let gameStartTime = 0;
let nextBossMilestone = BOSS_STEP;
let nextBoostMilestone = BOOST_STEP;
const boosts = [];
const shields = [];
let slowUntil = 0;
let novaFlash = 0;
let highScores = [];
let scorePhase = "submit"; // "submit" | "leaderboard"

function startLobby() {
  if (!lobbyStarted) {
    lobbyStarted = true;
    canvas = document.getElementById("game");
    ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;
    W = canvas.width;
    H = canvas.height;
    mouse.x = W / 2; mouse.y = H / 2;
    player.x = W / 2; player.y = H * 0.78;
    for (let i = 0; i < INITIAL_ENEMIES; i++) enemies.push(spawnEnemy());
    gameStartTime = performance.now();
    lastHealTime = gameStartTime;
    setupLobbyInput();
    requestAnimationFrame(frame);
  }
  lobbyRunning = true;
  canvas.focus();
}

function pauseLobby() {
  lobbyRunning = false;
  pressed.clear();
  mouse.down = false;
}

function setupLobbyInput() {
  function onKeyDown(e) {
    if (!lobbyRunning) return;
    // Let the score-name input receive keystrokes untouched.
    if (document.activeElement === scoreNameInput) return;
    if (e.code) pressed.add(e.code);
    if (e.key)  pressed.add(e.key.toLowerCase());
    const k = (e.key || "").toLowerCase();
    if (gameOver) {
      if (k === "r")      { restartGame(); e.preventDefault(); return; }
      if (k === "escape") { returnToTerminal(); e.preventDefault(); return; }
    }
    if (MOVEMENT_KEYS.has(k)) { e.preventDefault(); e.stopPropagation(); }
  }
  function onKeyUp(e) {
    if (!lobbyRunning) return;
    if (e.code) pressed.delete(e.code);
    if (e.key)  pressed.delete(e.key.toLowerCase());
  }
  const capt = { capture: true };
  for (const target of [window, document, document.documentElement, document.body, canvas]) {
    if (!target) continue;
    target.addEventListener("keydown", onKeyDown, capt);
    target.addEventListener("keyup",   onKeyUp,   capt);
  }
  window.addEventListener("blur", () => pressed.clear());
  document.addEventListener("visibilitychange", () => { if (document.hidden) pressed.clear(); });

  function updateMouse(e) {
    const r = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - r.left) * (canvas.width / r.width);
    mouse.y = (e.clientY - r.top)  * (canvas.height / r.height);
  }
  canvas.addEventListener("mousemove", updateMouse);
  canvas.addEventListener("mousedown", e => {
    if (!lobbyRunning) return;
    mouse.down = true; canvas.focus(); updateMouse(e);
  });
  canvas.addEventListener("mouseup", () => { mouse.down = false; });
  canvas.addEventListener("contextmenu", e => e.preventDefault());
}

function numShots() {
  if (kills >= WEAPON_TIER_MEGA)   return 6;
  if (kills >= WEAPON_TIER_PIERCE) return 5;
  if (kills >= WEAPON_TIER_4)      return 4;
  if (kills >= WEAPON_TIER_3)      return 3;
  if (kills >= WEAPON_TIER_2)      return 2;
  return 1;
}

function bulletDamage() {
  return kills >= WEAPON_TIER_MEGA ? 2 : 1;
}

function ringConfig() {
  if (kills >= WEAPON_TIER_MEGA)
    return { count: 24, speed: 9.5, every: 9,  life: 80, spin: 1.8, pierce: true, dual: true, triple: true };
  if (kills >= WEAPON_TIER_PIERCE)
    return { count: 16, speed: 8.5, every: 12, life: 70, spin: 1.5, pierce: true, dual: true };
  if (kills >= WEAPON_TIER_RING_BIG)
    return { count: 12, speed: 7.2, every: 16, life: 65, spin: 1.2, pierce: false };
  if (kills >= WEAPON_TIER_RING)
    return { count: 8,  speed: 6.0, every: 22, life: 55, spin: 1.0, pierce: false };
  return null;
}

function spawnBoss(idx) {
  const boss = spawnEnemy();
  const palette = ["#ff3030", "#ff6020", "#ff20a0", "#ff20ff", "#a020ff", "#ff8060"];
  boss.type = "virus";
  boss.boss = true;
  boss.bossIdx = idx;
  boss.color = palette[idx % palette.length];
  boss.size = 1.7 + Math.min(idx, 8) * 0.12;
  boss.maxHp = 40 + idx * 22;             // ~2x previous + harder scaling
  boss.hp = boss.maxHp;
  boss.speedMul = 1.6 + Math.min(idx, 6) * 0.12;
  boss.fireRate = Math.max(35, 100 - idx * 6);
  boss.fireCD = 50;
  boss.damage = 2 + Math.floor(idx / 3);  // bullets hit harder, scales every 3 milestones
  enemies.push(boss);
}

function spawnEnemy() {
  const type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
  const color = type === "mask" ? "#e8d8b8"
              : type === "virus" ? "#d04848"
              : bugColors[Math.floor(Math.random() * bugColors.length)];
  const hp = type === "bug" ? 2 : type === "mask" ? 4 : 5;
  let x = 0, y = 0;
  for (let i = 0; i < 8; i++) {
    x = 60 + Math.random() * (W - 120);
    y = 60 + Math.random() * (H - 220);
    if (Math.hypot(x - player.x, y - player.y) > 180) break;
  }
  return {
    type,
    x, y,
    vx: (Math.random() - 0.5) * 1.0,
    vy: (Math.random() - 0.5) * 1.0,
    hp, maxHp: hp,
    color,
    hop: Math.random() * Math.PI * 2,
    flash: 0,
    fireCD: 90 + Math.floor(Math.random() * 180),
  };
}

function spawnBoost() {
  const type = BOOST_TYPES[Math.floor(Math.random() * BOOST_TYPES.length)];
  let x = W/2, y = H/2;
  for (let i = 0; i < 10; i++) {
    x = 80 + Math.random() * (W - 160);
    y = 80 + Math.random() * (H - 200);
    if (Math.hypot(x - player.x, y - player.y) > 140) break;
  }
  boosts.push({ x, y, type, life: BOOST_LIFE_FRAMES, born: t });
}

function activateBoost(b) {
  if (b.type === "heal") {
    player.hp = player.maxHp;
  } else if (b.type === "shield") {
    shields.push({ x: b.x, y: b.y, r: 72, life: 14 * 60, born: t });
  } else if (b.type === "nova") {
    enemyBullets.length = 0;
    novaFlash = 24;
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.hp -= 6;
      e.flash = 6;
      if (e.hp <= 0) { kills++; enemies.splice(i, 1); }
    }
  } else if (b.type === "invuln") {
    player.invuln = Math.max(player.invuln, 6 * 60);
  } else if (b.type === "slow") {
    slowUntil = performance.now() + 8000;
  }
}

function boostColor(type) {
  switch (type) {
    case "heal":   return "#7fff7f";
    case "shield": return "#95e6cb";
    case "nova":   return "#ffaa00";
    case "invuln": return "#ffe9a8";
    case "slow":   return "#59c2ff";
  }
  return "#fff";
}
function boostLabel(type) {
  switch (type) {
    case "heal":   return "HEAL";
    case "shield": return "SHIELD";
    case "nova":   return "NOVA";
    case "invuln": return "INVULN";
    case "slow":   return "SLOW";
  }
  return "?";
}

function restartGame() {
  hideScoreOverlay();
  player.hp = player.maxHp;
  player.x = W / 2; player.y = H * 0.78;
  player.invuln = 90;
  player.shotsFired = 0;
  player.shotsHit = 0;
  bullets.length = 0;
  enemyBullets.length = 0;
  trail.length = 0;
  enemies.length = 0;
  for (let i = 0; i < INITIAL_ENEMIES; i++) enemies.push(spawnEnemy());
  kills = 0;
  nextBossMilestone = BOSS_STEP;
  nextBoostMilestone = BOOST_STEP;
  boosts.length = 0;
  shields.length = 0;
  slowUntil = 0;
  novaFlash = 0;
  scorePhase = "submit";
  highScores = [];
  gameOver = false;
  gameStartTime = performance.now();
  lastHealTime = gameStartTime;
  canvas.focus();
}

function showScoreOverlay() {
  scorePhase = "submit";
  scoreOverlay.hidden = false;
  scoreNameInput.value = "";
  scoreNameInput.disabled = false;
  scoreStatusEl.textContent = "";
  scoreSubmitting = false;
  loadHighScores();   // start fetch in the background
  setTimeout(() => scoreNameInput.focus(), 30);
}

function hideScoreOverlay() {
  scoreOverlay.hidden = true;
  if (document.activeElement === scoreNameInput) scoreNameInput.blur();
}

function showLeaderboard() {
  scorePhase = "leaderboard";
  hideScoreOverlay();
  canvas.focus();
}

async function loadHighScores() {
  try {
    const r = await fetch(SCORES_API);
    if (r.ok) {
      const data = await r.json();
      if (Array.isArray(data)) highScores = data.slice(0, 10);
    }
  } catch {}
}

async function submitScore() {
  if (scoreSubmitting) return;
  const name = scoreNameInput.value.replace(NAME_ALLOWED, "").slice(0, 10).trim();
  if (!name) {
    scoreStatusEl.textContent = "Enter a name.";
    return;
  }
  scoreSubmitting = true;
  scoreNameInput.disabled = true;
  scoreStatusEl.textContent = "Sending…";
  try {
    const r = await fetch(SCORE_API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, score: kills, percentage: 100 }),
    });
    if (!r.ok) {
      const data = await r.json().catch(() => ({}));
      scoreStatusEl.textContent = "Error: " + (data.error || ("HTTP " + r.status));
      scoreNameInput.disabled = false;
      scoreSubmitting = false;
      return;
    }
    scoreStatusEl.textContent = "Score submitted!";
    await loadHighScores();
    setTimeout(showLeaderboard, 900);
  } catch (err) {
    scoreStatusEl.textContent = "Could not connect to server.";
    scoreNameInput.disabled = false;
    scoreSubmitting = false;
  }
}

const NAME_ALLOWED = /[^A-Za-z0-9 ]/g;
scoreNameInput.addEventListener("input", () => {
  const cleaned = scoreNameInput.value.replace(NAME_ALLOWED, "");
  if (cleaned !== scoreNameInput.value) scoreNameInput.value = cleaned;
});
scoreForm.addEventListener("submit", e => { e.preventDefault(); submitScore(); });
scoreSkipBtn.addEventListener("click", showLeaderboard);

// --- Update --------------------------------------------------------------
function update() {
  if (gameOver) return;

  let dx = 0, dy = 0;
  if (down("KeyW", "ArrowUp",    "w", "arrowup"))    dy -= 1;
  if (down("KeyS", "ArrowDown",  "s", "arrowdown"))  dy += 1;
  if (down("KeyA", "ArrowLeft",  "a", "arrowleft"))  { dx -= 1; player.facing = -1; }
  if (down("KeyD", "ArrowRight", "d", "arrowright")) { dx += 1; player.facing = 1; }
  if (dx || dy) {
    const len = Math.hypot(dx, dy);
    player.x += (dx / len) * player.speed;
    player.y += (dy / len) * player.speed;
    if (t % 4 === 0) trail.push({ x: player.x, y: player.y + 8, life: 24, max: 24 });
  }
  player.x = Math.max(14, Math.min(W - 14, player.x));
  player.y = Math.max(20, Math.min(H - 24, player.y));

  for (let i = trail.length - 1; i >= 0; i--) {
    if (--trail[i].life <= 0) trail.splice(i, 1);
  }

  if (player.invuln > 0) player.invuln--;

  // Passive regen: +1 HP every 10s up to max.
  const nowMs = performance.now();
  if (nowMs - lastHealTime >= HEAL_INTERVAL_MS) {
    if (player.hp < player.maxHp) player.hp++;
    lastHealTime = nowMs;
  }

  player.cooldown = Math.max(0, player.cooldown - 1);
  const N = numShots();
  const pierce = kills >= WEAPON_TIER_PIERCE;
  const dmg = bulletDamage();
  if (mouse.down && player.cooldown <= 0) {
    const ax = mouse.x - player.x;
    const ay = mouse.y - player.y;
    const baseAngle = Math.atan2(ay, ax);
    const spread = 0.16;
    for (let i = 0; i < N; i++) {
      const offset = N === 1 ? 0 : (i - (N - 1) / 2) * spread;
      const a = baseAngle + offset;
      bullets.push({
        x: player.x, y: player.y - 4,
        vx: Math.cos(a) * (pierce ? 11 : 9.5),
        vy: Math.sin(a) * (pierce ? 11 : 9.5),
        life: 60,
        digit: Math.random() < 0.5 ? "0" : "1",
        pierce,
        damage: dmg,
      });
    }
    player.shotsFired += N;
    // Fire rate accelerates as more enemies appear; MEGA tier lowers the floor.
    const minCD = kills >= WEAPON_TIER_MEGA ? 1 : 2;
    player.cooldown = Math.max(minCD, 6 - Math.floor(enemies.length / 25));
  }

  // Omnidirectional ring — properties scale with weapon tier.
  const ring = ringConfig();
  if (ring && t % ring.every === 0) {
    for (let i = 0; i < ring.count; i++) {
      const a = (i / ring.count) * Math.PI * 2 + (t * 0.003) * (ring.spin || 1);
      bullets.push({
        x: player.x, y: player.y - 4,
        vx: Math.cos(a) * ring.speed,
        vy: Math.sin(a) * ring.speed,
        life: ring.life,
        digit: Math.random() < 0.5 ? "0" : "1",
        passive: true,
        pierce: ring.pierce || false,
        damage: dmg,
      });
    }
    // Dense tier also fires a counter-rotating outer ring.
    if (ring.dual) {
      const N2 = ring.count;
      for (let i = 0; i < N2; i++) {
        const a = (i / N2) * Math.PI * 2 - (t * 0.004);
        bullets.push({
          x: player.x, y: player.y - 4,
          vx: Math.cos(a) * (ring.speed * 0.7),
          vy: Math.sin(a) * (ring.speed * 0.7),
          life: ring.life,
          digit: Math.random() < 0.5 ? "0" : "1",
          passive: true,
          pierce: true,
          damage: dmg,
        });
      }
    }
    // MEGA tier: third inner ring spinning forward, fast.
    if (ring.triple) {
      const N3 = Math.floor(ring.count * 0.75);
      for (let i = 0; i < N3; i++) {
        const a = (i / N3) * Math.PI * 2 + (t * 0.006);
        bullets.push({
          x: player.x, y: player.y - 4,
          vx: Math.cos(a) * (ring.speed * 1.15),
          vy: Math.sin(a) * (ring.speed * 1.15),
          life: ring.life,
          digit: Math.random() < 0.5 ? "0" : "1",
          passive: true,
          pierce: true,
          damage: dmg,
        });
      }
    }
  }

  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.life <= 0 || b.x < 0 || b.x > W || b.y < 0 || b.y > H) {
      bullets.splice(i, 1); continue;
    }
    let consumed = false;
    const hitDmg = b.damage || 1;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      const hitR = 14 * (e.size || 1);
      if (Math.hypot(b.x - e.x, b.y - e.y) >= hitR) continue;
      if (b.pierce) {
        if (!b.hits) b.hits = new Set();
        if (b.hits.has(e)) continue;
        b.hits.add(e);
        e.hp -= hitDmg;
        e.flash = 6;
        if (!b.passive) player.shotsHit++;
        if (e.hp <= 0) { kills++; enemies.splice(j, 1); }
      } else {
        e.hp -= hitDmg;
        e.flash = 6;
        bullets.splice(i, 1);
        if (!b.passive) player.shotsHit++;
        if (e.hp <= 0) { kills++; enemies.splice(j, 1); }
        consumed = true;
        break;
      }
    }
    if (consumed) continue;
  }

  // Boss waves: every BOSS_STEP kills, spawn an escalating count.
  while (kills >= nextBossMilestone) {
    const idx = Math.floor(nextBossMilestone / BOSS_STEP) - 1;
    const count = idx + 1;
    for (let i = 0; i < count; i++) spawnBoss(idx);
    nextBossMilestone += BOSS_STEP;
  }

  // Boost drops: every BOOST_STEP kills, drop a random boost on the field.
  while (kills >= nextBoostMilestone) {
    spawnBoost();
    nextBoostMilestone += BOOST_STEP;
  }

  // Boost pickup + lifetime decay.
  for (let i = boosts.length - 1; i >= 0; i--) {
    const b = boosts[i];
    b.life--;
    if (b.life <= 0) { boosts.splice(i, 1); continue; }
    if (Math.hypot(b.x - player.x, b.y - player.y) < BOOST_PICKUP_R) {
      activateBoost(b);
      boosts.splice(i, 1);
    }
  }

  // Shield decay.
  for (let i = shields.length - 1; i >= 0; i--) {
    if (--shields[i].life <= 0) shields.splice(i, 1);
  }
  if (novaFlash > 0) novaFlash--;

  megaUpdate();

  // Time-based exponential spawn ramp.
  const elapsed = (performance.now() - gameStartTime) / 1000;
  const target = Math.min(
    MAX_ENEMIES,
    Math.floor(INITIAL_ENEMIES * Math.pow(2, elapsed / SPAWN_DOUBLE_SEC))
  );
  if (enemies.length < target) enemies.push(spawnEnemy());

  const timeScale = performance.now() < slowUntil ? 0.4 : 1;

  for (const e of enemies) {
    const sm = (e.speedMul || 1) * timeScale;
    e.hop += 0.07 * timeScale;
    e.x += e.vx * sm;
    e.y += e.vy * sm;
    if (Math.random() < 0.012 * timeScale) {
      e.vx = (Math.random() - 0.5) * 1.0;
      e.vy = (Math.random() - 0.5) * 1.0;
    }
    if (e.x < 30 || e.x > W - 30) e.vx *= -1;
    if (e.y < 30 || e.y > H - 60) e.vy *= -1;
    if (e.flash > 0) e.flash--;

    if (e.fireCD > 0) e.fireCD -= timeScale;
    if (e.fireCD <= 0) {
      const dmg = e.damage || 1;
      if (e.type === "virus") {
        const N = e.boss ? 24 : 16;
        const speed = e.boss ? 3.2 : 2.4;
        for (let i = 0; i < N; i++) {
          const a = (i / N) * Math.PI * 2 + (t * 0.0005);
          enemyBullets.push({
            x: e.x, y: e.y,
            vx: Math.cos(a) * speed,
            vy: Math.sin(a) * speed,
            life: 130,
            color: e.color,
            kind: "ring",
            damage: dmg,
          });
        }
        e.fireCD = e.boss ? e.fireRate : 180 + Math.floor(Math.random() * 60);
      } else if (e.type === "mask") {
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        const spread = 0.26;
        for (let i = -1; i <= 1; i++) {
          const a = angle + i * spread;
          enemyBullets.push({
            x: e.x, y: e.y,
            vx: Math.cos(a) * 3.6,
            vy: Math.sin(a) * 3.6,
            life: 110,
            color: "#ff6464",
            kind: "spread",
            damage: dmg,
          });
        }
        e.fireCD = 100 + Math.floor(Math.random() * 50);
      } else {
        e.fireCD = 999999;
      }
    }
  }

  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx * timeScale;
    b.y += b.vy * timeScale;
    b.life -= timeScale;
    const margin = b.kind === "mega" ? 60 : 10;
    if (b.life <= 0 || b.x < -margin || b.x > W + margin || b.y < -margin || b.y > H + margin) {
      enemyBullets.splice(i, 1); continue;
    }
    // Shield discs absorb all incoming enemy projectiles.
    let blocked = false;
    for (const s of shields) {
      if (Math.hypot(b.x - s.x, b.y - s.y) < s.r) { blocked = true; break; }
    }
    if (blocked) { enemyBullets.splice(i, 1); continue; }
    const hitR = b.kind === "mega" ? 18 : 11;
    if (player.invuln <= 0 && Math.hypot(b.x - player.x, b.y - (player.y - 6)) < hitR) {
      player.hp -= (b.damage || 1);
      player.invuln = 50;
      enemyBullets.splice(i, 1);
      if (player.hp <= 0) { gameOver = true; showScoreOverlay(); break; }
    }
  }
}

// --- Mega projectors -----------------------------------------------------
function megaUpdate() {
  if (kills < MEGA_RIGHT) return;
  const cycle = kills >= MEGA_CENTER ? 55
              : kills >= MEGA_BOTTOM ? 75
              : kills >= MEGA_TOP    ? 90
              : kills >= MEGA_LEFT   ? 105
              :                        130;
  if (t % cycle !== 0) return;

  if (kills >= MEGA_RIGHT)  fireMegaSalvo("right");
  if (kills >= MEGA_LEFT)   fireMegaSalvo("left");
  if (kills >= MEGA_TOP)    fireMegaSalvo("top");
  if (kills >= MEGA_BOTTOM) fireMegaSalvo("bottom");
  if (kills >= MEGA_CENTER) fireMegaCenter();
}

function fireMegaSalvo(side) {
  const fast  = kills >= MEGA_CENTER;
  const speed = fast ? 7.5 : 5.0;
  const pairs = 3;
  const damage = 3 + Math.floor((kills - MEGA_RIGHT) / 1500);
  for (let p = 0; p < pairs; p++) {
    const t01 = pairs === 1 ? 0.5 : p / (pairs - 1);
    let x, y, vx, vy;
    if (side === "right")  { x = W + 30;            y = 80 + t01 * (H - 200); vx = -speed; vy = 0; }
    else if (side === "left")   { x = -30;          y = 80 + t01 * (H - 200); vx =  speed; vy = 0; }
    else if (side === "top")    { x = 120 + t01 * (W - 240); y = -30;         vx = 0; vy =  speed; }
    else                        { x = 120 + t01 * (W - 240); y = H + 30;      vx = 0; vy = -speed; }
    enemyBullets.push({
      x, y, vx, vy,
      life: 280,
      color: "#ff20ff",
      kind: "mega",
      damage,
    });
  }
}

function fireMegaCenter() {
  const N = 28;
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2 + (t * 0.003);
    enemyBullets.push({
      x: W/2, y: H/2,
      vx: Math.cos(a) * 4.8,
      vy: Math.sin(a) * 4.8,
      life: 220,
      color: "#ff80ff",
      kind: "ring",
      damage: 2,
    });
  }
}

// --- Render --------------------------------------------------------------
function render() {
  t++;

  // Grass
  ctx.fillStyle = "#3a6a3a";
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "#3e7240";
  for (let y = 0; y < H; y += 32) {
    for (let x = 0; x < W; x += 32) {
      if (((x/32) + (y/32)) % 2 === 0) ctx.fillRect(x, y, 32, 32);
    }
  }
  ctx.fillStyle = "#5b8e3e";
  for (let i = 0; i < 100; i++) {
    const x = (i * 113) % W; const y = (i * 277) % H;
    ctx.fillRect(x, y, 2, 2);
  }
  ctx.fillStyle = "#5a5a5a";
  for (let x = 0; x < W; x += 32) { ctx.fillRect(x, 0, 16, 4); ctx.fillRect(x+8, H-4, 16, 4); }
  for (let y = 0; y < H; y += 32) { ctx.fillRect(0, y, 4, 16); ctx.fillRect(W-4, y+8, 4, 16); }

  for (const p of trail) {
    const a = (p.life / p.max) * 0.35;
    ctx.fillStyle = `rgba(20,30,20,${a})`;
    ctx.fillRect(p.x - 3, p.y - 1, 6, 2);
  }

  // Shield bases drawn under everything else.
  for (const s of shields) drawShieldBase(s);

  // Z-sort decor + enemies + player + boosts
  const drawables = [];
  for (const d of DECOR) {
    if (d.type === "tree") drawables.push({ y: d.y + 4, draw: () => drawTree(d.x, d.y) });
    else                   drawables.push({ y: d.y + 2, draw: () => drawRock(d.x, d.y) });
  }
  for (const e of enemies) {
    const hopY = Math.abs(Math.sin(e.hop)) * 6;
    drawables.push({ y: e.y, draw: () => { drawEnemy(e, hopY); drawEnemyHpBar(e, hopY); } });
  }
  for (const b of boosts) drawables.push({ y: b.y + 14, draw: () => drawBoost(b) });
  drawables.push({ y: player.y, draw: () => drawPlayer(player.x, player.y, player.facing) });
  drawables.sort((a, b) => a.y - b.y);
  for (const d of drawables) d.draw();

  // Shield rim drawn over enemies/player so it always reads as a barrier.
  for (const s of shields) drawShieldRim(s);

  for (const b of enemyBullets) drawEnemyBullet(b);

  ctx.font = "bold 12px ui-monospace, monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  for (const b of bullets) {
    const pierce = b.pierce;
    ctx.fillStyle = pierce ? "rgba(255,138,255,0.45)" : "rgba(127,255,127,0.4)";
    ctx.fillText(b.digit, b.x + 1, b.y + 1);
    ctx.fillStyle = pierce ? "#ffaaff" : "#cfffd0";
    ctx.fillText(b.digit, b.x, b.y);
  }
  ctx.textBaseline = "alphabetic";

  // HUD
  drawHpBar(12, 10, 200, 16);
  drawStatsBar(12, 32, 200, 16);
  drawWeaponBar(12, 54, 200, 16);
  drawHudRight(W - 12, 10, "Bugs: " + kills, "#ffe9a8");
  drawHudCenter(W/2, H - 28,
    "WASD  move   ·   CLICK  shoot",
    "#cfe7c8");
  drawWASDIndicator(16, H - 70);

  // Slow-time tint.
  if (performance.now() < slowUntil) {
    ctx.fillStyle = "rgba(89, 194, 255, 0.08)";
    ctx.fillRect(0, 0, W, H);
  }
  // Nova flash.
  if (novaFlash > 0) {
    ctx.fillStyle = `rgba(255, 200, 80, ${novaFlash / 24 * 0.55})`;
    ctx.fillRect(0, 0, W, H);
  }

  if (!gameOver) drawCursor();
  if (gameOver) drawGameOver();
}

// --- HUD pieces ----------------------------------------------------------
function drawHpBar(x, y, w, h) {
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(x, y, w, h);
  const innerW = w - 4;
  const fill = Math.max(0, (player.hp / player.maxHp) * innerW);
  const lowHp = player.hp <= 3;
  ctx.fillStyle = lowHp ? "#ff6868" : "#7fff7f";
  ctx.fillRect(x + 2, y + 2, fill, h - 4);
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  for (let i = 1; i < player.maxHp; i++) {
    const sx = x + 2 + (i / player.maxHp) * innerW;
    ctx.fillRect(sx, y + 2, 1, h - 4);
  }
  ctx.font = "bold 11px ui-monospace, monospace";
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "#fff";
  ctx.fillText(`HP ${player.hp}/${player.maxHp}`, x + 6, y + h/2);
  ctx.textBaseline = "alphabetic";
}

function drawStatsBar(x, y, w, h) {
  const acc = player.shotsFired === 0 ? 0 : (player.shotsHit / player.shotsFired) * 100;
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(x, y, w, h);
  ctx.font = "bold 11px ui-monospace, monospace";
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "#cfffd0";
  ctx.fillText(
    `Shots ${player.shotsHit}/${player.shotsFired}  ·  ${acc.toFixed(0)}%`,
    x + 6, y + h/2);
  ctx.textBaseline = "alphabetic";
}

function drawWeaponBar(x, y, w, h) {
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(x, y, w, h);
  ctx.font = "bold 11px ui-monospace, monospace";
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "#cfe7c8";
  ctx.fillText("Weapon", x + 6, y + h/2);

  const N = numShots();
  const dotR = 2.0;
  let dx = x + 58;
  for (let i = 0; i < 6; i++) {
    const filled = i < N;
    if (filled) {
      ctx.fillStyle = i === 5 ? "#ffaa00" : "#cfffd0";
      ctx.beginPath(); ctx.arc(dx, y + h/2, dotR, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.strokeStyle = "rgba(207,231,200,0.30)";
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(dx + 0.5, y + h/2 + 0.5, dotR, 0, Math.PI * 2); ctx.stroke();
    }
    dx += 6;
  }

  // Ring indicator: outline always shown; lit and grows by tier.
  let ringTier = 0;
  if (kills >= WEAPON_TIER_MEGA)          ringTier = 4;
  else if (kills >= WEAPON_TIER_PIERCE)   ringTier = 3;
  else if (kills >= WEAPON_TIER_RING_BIG) ringTier = 2;
  else if (kills >= WEAPON_TIER_RING)     ringTier = 1;

  const cx = dx + 12;
  const cy = y + h/2;
  const r  = 4 + ringTier * 0.6;
  const color = ringTier === 0 ? "rgba(255,233,168,0.25)"
              : ringTier === 4 ? "#ffaa00"
              : ringTier === 3 ? "#ff8aff"
              :                  "#ffe9a8";
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  if (ringTier > 0) {
    const pips = 4 + ringTier * 2;
    ctx.fillStyle = color;
    for (let i = 0; i < pips; i++) {
      const a = (i / pips) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(a) * r, cy + Math.sin(a) * r, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Pierce + damage badges.
  ctx.font = "bold 10px ui-monospace, monospace";
  if (kills >= WEAPON_TIER_PIERCE) {
    ctx.fillStyle = "#ff8aff";
    ctx.fillText("P", cx + 14, cy);
  }
  if (kills >= WEAPON_TIER_MEGA) {
    ctx.fillStyle = "#ffaa00";
    ctx.fillText("x2", cx + 26, cy);
  }

  ctx.textBaseline = "alphabetic";
}

function drawHudRight(rightX, y, text, color) {
  ctx.font = "bold 12px ui-monospace, monospace";
  ctx.textAlign = "left";
  const tw = ctx.measureText(text).width;
  const pad = 10;
  const bx = rightX - tw - pad * 2;
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(bx, y, tw + pad * 2, 20);
  ctx.fillStyle = color;
  ctx.fillText(text, bx + pad, y + 14);
}

function drawHudCenter(cx, y, text, color) {
  ctx.font = "bold 12px ui-monospace, monospace";
  ctx.textAlign = "left";
  const tw = ctx.measureText(text).width;
  const pad = 10;
  const bx = cx - tw/2 - pad;
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(bx, y, tw + pad * 2, 20);
  ctx.fillStyle = color;
  ctx.fillText(text, bx + pad, y + 14);
}

function drawWASDIndicator(x0, y0) {
  const sz = 14, gap = 2;
  const cells = [
    { ch: "W", on: down("KeyW","w","ArrowUp","arrowup"),       cx: 1, cy: 0 },
    { ch: "A", on: down("KeyA","a","ArrowLeft","arrowleft"),   cx: 0, cy: 1 },
    { ch: "S", on: down("KeyS","s","ArrowDown","arrowdown"),   cx: 1, cy: 1 },
    { ch: "D", on: down("KeyD","d","ArrowRight","arrowright"), cx: 2, cy: 1 },
  ];
  ctx.font = "bold 9px ui-monospace, monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  for (const c of cells) {
    const cx = x0 + c.cx * (sz + gap);
    const cy = y0 + c.cy * (sz + gap);
    ctx.fillStyle = c.on ? "rgba(127,255,127,0.95)" : "rgba(0,0,0,0.55)";
    ctx.fillRect(cx, cy, sz, sz);
    ctx.strokeStyle = c.on ? "#000" : "#5b5b5b";
    ctx.lineWidth = 1;
    ctx.strokeRect(cx + 0.5, cy + 0.5, sz - 1, sz - 1);
    ctx.fillStyle = c.on ? "#000" : "#cfe7c8";
    ctx.fillText(c.ch, cx + sz/2, cy + sz/2 + 1);
  }
  ctx.textBaseline = "alphabetic";
}

function drawCursor() {
  const mx = Math.round(mouse.x), my = Math.round(mouse.y);
  ctx.strokeStyle = "#cfffd0";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(mx - 9 + 0.5, my + 0.5); ctx.lineTo(mx - 3 + 0.5, my + 0.5);
  ctx.moveTo(mx + 4 + 0.5, my + 0.5); ctx.lineTo(mx + 10 + 0.5, my + 0.5);
  ctx.moveTo(mx + 0.5, my - 9 + 0.5); ctx.lineTo(mx + 0.5, my - 3 + 0.5);
  ctx.moveTo(mx + 0.5, my + 4 + 0.5); ctx.lineTo(mx + 0.5, my + 10 + 0.5);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(mx + 0.5, my + 0.5, 5.5, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = "#cfffd0";
  ctx.fillRect(mx, my, 1, 1);
}

function drawGameOver() {
  ctx.fillStyle = "rgba(0,0,0,0.78)";
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.font = "bold 56px ui-monospace, monospace";
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillText("GAME OVER", W/2 + 3, 80);
  ctx.fillStyle = "#f07178";
  ctx.fillText("GAME OVER", W/2, 78);

  ctx.font = "14px ui-monospace, monospace";
  ctx.fillStyle = "#ffe9a8";
  ctx.fillText(`Bug kills: ${kills}`, W/2, 120);

  if (scorePhase === "leaderboard") drawLeaderboard();

  ctx.font = "bold 13px ui-monospace, monospace";
  ctx.fillStyle = "#cfe7c8";
  ctx.textAlign = "center";
  ctx.fillText("[R] restart   ·   [ESC] back to terminal", W/2, H - 24);

  ctx.textBaseline = "alphabetic";
}

function drawLeaderboard() {
  const headerY = 160;
  ctx.font = "bold 14px ui-monospace, monospace";
  ctx.fillStyle = "#95e6cb";
  ctx.textAlign = "center";
  ctx.fillText("— TOP 10 —", W/2, headerY);

  const startY = headerY + 26;
  const lineH = 18;
  const colX = W/2 - 140;     // left edge of the table
  const colW = 280;

  ctx.font = "12px ui-monospace, monospace";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "#cfe7c8";

  if (highScores.length === 0) {
    ctx.textAlign = "center";
    ctx.fillText("(no scores yet)", W/2, startY + lineH);
    return;
  }

  // Header row.
  ctx.fillStyle = "rgba(149,230,203,0.6)";
  ctx.textAlign = "left";
  ctx.fillText("#",    colX,        startY);
  ctx.fillText("NAME", colX + 36,   startY);
  ctx.textAlign = "right";
  ctx.fillText("KILLS", colX + colW, startY);

  for (let i = 0; i < highScores.length; i++) {
    const s = highScores[i];
    const y = startY + lineH * (i + 1);
    ctx.fillStyle = i === 0 ? "#ffe9a8" : "#cfe7c8";
    ctx.textAlign = "left";
    ctx.fillText(String(i + 1).padStart(2, " "), colX, y);
    ctx.fillText(String(s.name).slice(0, 10),    colX + 36, y);
    ctx.textAlign = "right";
    ctx.fillText(String(s.score),                colX + colW, y);
  }
}

// --- Sprites -------------------------------------------------------------
function px(x, y, w, h, c) {
  ctx.fillStyle = c;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

function drawPlayer(x, y, facing) {
  if (player.invuln > 0 && Math.floor(t / 4) % 2 === 0) return;
  const f = facing;
  px(x - 5, y - 18, 10, 4, "#3a2a4d");
  px(x - 3, y - 21, 6, 3, "#3a2a4d");
  px(x + (f>0 ? 1 : -3), y - 20, 2, 2, "#ffd866");
  px(x - 5, y - 14, 10, 6, "#fcd9a8");
  px(x + (f>0 ? 1 : -3), y - 12, 2, 2, "#222");
  px(x + (f>0 ? -3 : 1), y - 12, 2, 2, "#222");
  px(x - 7, y - 8, 14, 10, "#5a89c9");
  px(x - 7, y - 8, 14, 2, "#7aa6dd");
  px(x - 5, y + 2, 10, 4, "#3e6aa0");
  px(x - 6, y + 6, 4, 3, "#3a3");
  px(x + 2, y + 6, 4, 3, "#3a3");
}

function drawEnemy(e, hopY) {
  const x = e.x, y = e.y - hopY;
  const scale = e.size || 1;
  if (scale !== 1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.translate(-x, -y);
  }
  if      (e.type === "bug")  drawBug(x, y, e.color, e.flash > 0);
  else if (e.type === "mask") drawMask(x, y, e.flash > 0);
  else                        drawVirus(x, y, e.color, e.flash > 0);
  if (scale !== 1) ctx.restore();
}

function drawEnemyHpBar(e, hopY) {
  if (e.hp >= e.maxHp) return;
  const scale = e.size || 1;
  const w = 22 * scale, h = e.boss ? 4 : 3;
  const x = e.x - w/2;
  const y = e.y - hopY - 18 * scale;
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  const fill = (e.hp / e.maxHp) * w;
  ctx.fillStyle = e.hp <= 1 ? "#ff6868" : (e.hp <= e.maxHp / 2 ? "#ffd866" : "#7fff7f");
  ctx.fillRect(x, y, fill, h);
}

function drawBug(x, y, color, flash) {
  const c = flash ? "#fff" : color;
  const dark = flash ? "#fff" : shade(color, -35);
  px(x - 5, y - 9, 1, 4, "#1a1a1a");
  px(x + 4, y - 9, 1, 4, "#1a1a1a");
  px(x - 6, y - 10, 2, 1, "#1a1a1a");
  px(x + 4, y - 10, 2, 1, "#1a1a1a");
  px(x - 9, y - 1, 2, 1, "#1a1a1a");
  px(x + 7, y - 1, 2, 1, "#1a1a1a");
  px(x - 9, y + 2, 2, 1, "#1a1a1a");
  px(x + 7, y + 2, 2, 1, "#1a1a1a");
  px(x - 8, y + 5, 2, 1, "#1a1a1a");
  px(x + 6, y + 5, 2, 1, "#1a1a1a");
  px(x - 6, y - 5, 12, 3, dark);
  px(x - 7, y - 2, 14, 6, c);
  px(x - 6, y + 4, 12, 2, dark);
  px(x, y - 4, 1, 8, dark);
  px(x - 4, y - 3, 2, 2, "#f44");
  px(x + 2, y - 3, 2, 2, "#f44");
  px(x - 4, y - 3, 1, 1, "#fff");
  px(x + 2, y - 3, 1, 1, "#fff");
}

function drawMask(x, y, flash) {
  px(x - 8, y - 13, 16, 4, "#1a1a1a");
  px(x - 9, y - 11, 18, 2, "#1a1a1a");
  px(x - 7, y - 9, 14, 14, "#f0e6d2");
  px(x - 7, y - 9, 14, 1, "#c8bfa6");
  px(x - 6, y + 4, 12, 2, "#c8bfa6");
  px(x - 5, y - 7, 3, 1, "#1a1a1a");
  px(x + 2, y - 7, 3, 1, "#1a1a1a");
  px(x - 5, y - 5, 3, 2, "#1a1a1a");
  px(x + 2, y - 5, 3, 2, "#1a1a1a");
  px(x - 6, y - 1, 2, 1, "#f6b8b8");
  px(x + 4, y - 1, 2, 1, "#f6b8b8");
  px(x - 4, y, 8, 1, "#1a1a1a");
  px(x - 5, y - 1, 1, 1, "#1a1a1a");
  px(x + 4, y - 1, 1, 1, "#1a1a1a");
  px(x - 6, y - 1, 1, 1, "#1a1a1a");
  px(x + 5, y - 1, 1, 1, "#1a1a1a");
  px(x - 1, y + 1, 3, 1, "#a44");
  px(x - 2, y + 3, 4, 1, "#1a1a1a");
  px(x - 1, y + 4, 2, 2, "#1a1a1a");
  if (flash) {
    ctx.fillStyle = "rgba(255,255,255,0.55)";
    ctx.fillRect(x - 9, y - 14, 18, 22);
  }
}

function drawVirus(x, y, color, flash) {
  const c = flash ? "#fff" : color;
  const dark = flash ? "#fff" : shade(color, -40);
  px(x,        y - 11, 1, 4, c);
  px(x,        y + 8,  1, 4, c);
  px(x - 11,   y,      4, 1, c);
  px(x + 8,    y,      4, 1, c);
  px(x - 8,    y - 8,  2, 2, c);
  px(x + 6,    y - 8,  2, 2, c);
  px(x - 8,    y + 6,  2, 2, c);
  px(x + 6,    y + 6,  2, 2, c);
  px(x - 1,    y - 12, 3, 2, dark);
  px(x - 1,    y + 11, 3, 2, dark);
  px(x - 13,   y - 1,  2, 3, dark);
  px(x + 11,   y - 1,  2, 3, dark);
  px(x - 6, y - 4, 12, 8, c);
  px(x - 4, y - 6, 8, 12, c);
  px(x - 5, y - 5, 10, 1, dark);
  px(x - 5, y + 4, 10, 1, dark);
  px(x - 3, y - 3, 2, 2, "#1a1a1a");
  px(x + 1, y, 2, 2, "#1a1a1a");
  px(x - 1, y + 2, 2, 2, "#1a1a1a");
}

function drawEnemyBullet(b) {
  if (b.kind === "mega") {
    const r = 14 + Math.sin(t * 0.25) * 2;
    ctx.fillStyle = withAlpha(b.color, 0.25);
    ctx.beginPath(); ctx.arc(b.x, b.y, r + 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = withAlpha(b.color, 0.55);
    ctx.beginPath(); ctx.arc(b.x, b.y, r + 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.beginPath(); ctx.arc(b.x - 3, b.y - 3, 3, 0, Math.PI * 2); ctx.fill();
    return;
  }
  if (b.kind === "ring") {
    const r = 4 + Math.sin(t * 0.3) * 0.6;
    ctx.fillStyle = withAlpha(b.color, 0.35);
    ctx.beginPath(); ctx.arc(b.x, b.y, r + 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.beginPath(); ctx.arc(b.x - 1, b.y - 1, 1.4, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.fillStyle = withAlpha(b.color, 0.35);
    ctx.fillRect(b.x - 6, b.y - 2, 12, 4);
    ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x - 5, b.y - 1, 10, 2);
    ctx.fillRect(b.x - 1, b.y - 5, 2, 10);
  }
}

function drawBoost(b) {
  const age = t - b.born;
  const bob = Math.sin(age * 0.08) * 2;
  const cx = b.x, cy = b.y + bob;
  const fade = b.life < 90 ? Math.max(0.3, b.life / 90) : 1;
  const blink = b.life < 60 && Math.floor(t / 6) % 2 === 0;
  const color = boostColor(b.type);
  const dark  = shade(color, -55);
  const light = shade(color, 35);

  // Ground shadow.
  ctx.fillStyle = `rgba(0,0,0,${0.30 * fade})`;
  ctx.beginPath(); ctx.ellipse(b.x, b.y + 18, 14, 4, 0, 0, Math.PI * 2); ctx.fill();

  // Pixel chassis (28x28) styled after the lab portals.
  const x = Math.round(cx - 14), y = Math.round(cy - 14);
  px(x,      y,      28, 28, "#454545");
  px(x,      y,      28, 2,  "#5a5a5a");
  px(x,      y + 26, 28, 2,  "#252525");
  px(x,      y + 2,  2,  24, "#353535");
  px(x + 26, y + 2,  2,  24, "#353535");
  // Recessed inner well.
  px(x + 2, y + 2, 24, 24, "#0a0a0a");
  px(x + 4, y + 4, 20, 20, dark);
  // Colored screen.
  px(x + 6, y + 6, 16, 16, color);
  // Highlight + scanline shading.
  px(x + 6, y + 6, 4, 1, light);
  px(x + 6, y + 6, 1, 4, light);
  for (let i = 0; i < 16; i += 3) {
    ctx.fillStyle = "rgba(0,0,0,0.18)";
    ctx.fillRect(x + 6, y + 6 + i, 16, 1);
  }
  // Drifting shimmer pixels.
  ctx.fillStyle = light;
  for (let i = 0; i < 3; i++) {
    const sx = x + 6 + ((Math.floor(t / 5) * 3 + i * 5) % 14);
    const sy = y + 6 + ((Math.floor(t / 7) + i * 4) % 14);
    ctx.fillRect(sx, sy, 1, 1);
  }
  // LED.
  const ledOn = !blink && Math.floor(t / 18) % 2 === 0;
  px(x + 23, y + 23, 2, 2, ledOn ? color : "#222");

  // Pixel icon centered.
  if (!blink) drawBoostIcon(b.type, x + 14, y + 14);

  // Label tag below the chassis.
  const label = boostLabel(b.type);
  ctx.font = "bold 9px ui-monospace, monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";
  const tw = ctx.measureText(label).width;
  const lx = Math.round(cx - tw/2) - 4;
  const ly = Math.round(cy + 16);
  px(lx, ly, tw + 8, 12, "#0a0a0a");
  px(lx, ly, tw + 8, 1,  color);
  px(lx, ly + 11, tw + 8, 1, color);
  ctx.fillStyle = color;
  ctx.fillText(label, cx, ly + 9);
}

function drawBoostIcon(type, cx, cy) {
  const c = "#0a0a0a";
  if (type === "heal") {
    px(cx - 1, cy - 4, 2, 9, c);
    px(cx - 4, cy - 1, 9, 2, c);
  } else if (type === "shield") {
    px(cx - 3, cy - 4, 6, 1, c);
    px(cx - 4, cy - 3, 8, 1, c);
    px(cx - 4, cy - 2, 8, 4, c);
    px(cx - 3, cy + 2, 6, 1, c);
    px(cx - 2, cy + 3, 4, 1, c);
    px(cx - 1, cy + 4, 2, 1, c);
  } else if (type === "nova") {
    px(cx - 1, cy - 4, 2, 9, c);
    px(cx - 4, cy - 1, 9, 2, c);
    px(cx - 3, cy - 3, 2, 2, c);
    px(cx + 1, cy - 3, 2, 2, c);
    px(cx - 3, cy + 1, 2, 2, c);
    px(cx + 1, cy + 1, 2, 2, c);
  } else if (type === "invuln") {
    px(cx,     cy - 4, 1, 1, c);
    px(cx - 1, cy - 3, 3, 1, c);
    px(cx - 1, cy - 2, 3, 1, c);
    px(cx - 4, cy - 1, 9, 1, c);
    px(cx - 3, cy,     7, 1, c);
    px(cx - 3, cy + 1, 2, 1, c);
    px(cx + 1, cy + 1, 2, 1, c);
    px(cx - 3, cy + 2, 1, 1, c);
    px(cx + 2, cy + 2, 1, 1, c);
    px(cx - 4, cy + 3, 1, 1, c);
    px(cx + 3, cy + 3, 1, 1, c);
  } else if (type === "slow") {
    // hourglass
    px(cx - 3, cy - 4, 7, 1, c);
    px(cx - 3, cy + 3, 7, 1, c);
    px(cx - 2, cy - 3, 5, 1, c);
    px(cx - 1, cy - 2, 3, 1, c);
    px(cx,     cy - 1, 1, 3, c);
    px(cx - 1, cy + 1, 3, 1, c);
    px(cx - 2, cy + 2, 5, 1, c);
  }
}

function drawShieldBase(s) {
  const fade = s.life < 60 ? s.life / 60 : 1;
  const pulse = 1 + Math.sin((t - s.born) * 0.1) * 0.04;
  ctx.fillStyle = `rgba(149,230,203,${0.10 * fade})`;
  ctx.beginPath(); ctx.arc(s.x, s.y, s.r * pulse, 0, Math.PI * 2); ctx.fill();
}

function drawShieldRim(s) {
  const fade = s.life < 60 ? s.life / 60 : 1;
  const blink = s.life < 60 && Math.floor(t / 6) % 2 === 0 ? 0.4 : 1;
  ctx.strokeStyle = `rgba(149,230,203,${0.85 * fade * blink})`;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = `rgba(149,230,203,${0.35 * fade})`;
  ctx.setLineDash([5, 7]);
  ctx.lineDashOffset = -t * 0.6;
  ctx.beginPath(); ctx.arc(s.x, s.y, s.r - 4, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.lineDashOffset = 0;
}

function drawTree(x, y) {
  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.28)";
  ctx.beginPath(); ctx.ellipse(x, y + 10, 18, 5, 0, 0, Math.PI * 2); ctx.fill();
  // trunk
  px(x - 3, y - 6, 6, 16, "#5a3b1a");
  px(x - 3, y - 6, 2, 16, "#3e2810");
  px(x + 1, y - 6, 1, 16, "#7a5a30");
  // crown
  px(x - 14, y - 30, 28, 8,  "#23501f");
  px(x - 18, y - 24, 36, 10, "#2f6a2c");
  px(x - 16, y - 14, 32, 6,  "#23501f");
  // highlights
  px(x - 12, y - 28, 6, 2, "#4a8e44");
  px(x + 4,  y - 22, 4, 2, "#4a8e44");
  px(x - 6,  y - 16, 4, 2, "#4a8e44");
}

function drawRock(x, y) {
  ctx.fillStyle = "rgba(0,0,0,0.30)";
  ctx.beginPath(); ctx.ellipse(x, y + 5, 13, 3, 0, 0, Math.PI * 2); ctx.fill();
  px(x - 9,  y - 2, 18, 7, "#6b6b6b");
  px(x - 11, y + 1, 22, 4, "#5e5e5e");
  px(x - 6,  y - 5, 12, 3, "#7a7a7a");
  px(x - 4,  y - 7, 6,  2, "#8a8a8a");
  px(x - 8,  y - 3, 3,  2, "#888");
  px(x + 5,  y - 1, 2,  2, "#4a4a4a");
}

// --- Color helpers -------------------------------------------------------
function shade(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  const r = clamp((n >> 16) + amt, 0, 255);
  const g = clamp(((n >> 8) & 0xff) + amt, 0, 255);
  const b = clamp((n & 0xff) + amt, 0, 255);
  return "#" + ((r << 16) | (g << 8) | b).toString(16).padStart(6, "0");
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function withAlpha(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${n>>16},${(n>>8)&0xff},${n&0xff},${a})`;
}

// --- Loop ----------------------------------------------------------------
function frame() {
  if (lobbyRunning) { update(); render(); }
  requestAnimationFrame(frame);
}
